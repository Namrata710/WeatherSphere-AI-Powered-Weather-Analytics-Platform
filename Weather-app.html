<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Weather App</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffffcc;
      --text: #333;
      --shadow: rgba(0, 0, 0, 0.2);
    }

    body.dark {
      --bg: #121212;
      --card-bg: #1e1e1ecc;
      --text: #f5f5f5;
      --shadow: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      padding: 2rem;
      transition: all 0.3s ease;
    }

    .weather-card {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 32px var(--shadow);
      backdrop-filter: blur(8px);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    input[type="text"] {
      padding: 0.5rem;
      width: 100%;
      border: none;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    button {
      background-color: #4a90e2;
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      margin: 0.5rem 0;
    }

    button:hover {
      background-color: #357ac7;
    }

    .dark-toggle {
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .weather-icon {
      width: 80px;
      height: 80px;
      margin: 1rem 0;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .day {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 0.5rem;
      font-size: 0.9rem;
    }

    .temp {
      font-size: 2rem;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      .weather-card {
        padding: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="dark-toggle">
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
  </div>

  <div class="weather-card">
    <h2>🌦 Weather App</h2>
    <input type="text" id="cityInput" placeholder="Enter city name" />
    <button onclick="getWeather()">Get Weather</button>
    <div id="weatherResult"></div>
    <div id="forecast"></div>
  </div>

  <script>
    const apiKey = "YOUR_API_KEY"; // Replace with your OpenWeatherMap API key

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    async function getWeather() {
      const city = document.getElementById("cityInput").value.trim();
      const weatherDiv = document.getElementById("weatherResult");
      const forecastDiv = document.getElementById("forecast");

      if (!city) {
        weatherDiv.innerHTML = "<p>Please enter a city name.</p>";
        forecastDiv.innerHTML = "";
        return;
      }

      weatherDiv.innerHTML = "Loading...";
      forecastDiv.innerHTML = "";

      try {
        // Current Weather
        const weatherRes = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
        );
        const weatherData = await weatherRes.json();

        if (weatherData.cod !== 200) throw new Error(weatherData.message);

        const { name, main, weather } = weatherData;
        const icon = weather[0].icon;
        const desc = weather[0].description;

        weatherDiv.innerHTML = `
          <img class="weather-icon" src="https://openweathermap.org/img/wn/${icon}@2x.png" />
          <div class="temp">${main.temp}°C</div>
          <div class="desc">${desc}</div>
          <div><strong>${name}</strong></div>
        `;

        // Forecast (5-day, every 3 hours → we'll filter for 12:00 PM data)
        const forecastRes = await fetch(
          `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`
        );
        const forecastData = await forecastRes.json();

        const days = {};
        forecastData.list.forEach(entry => {
          const time = entry.dt_txt;
          if (time.includes("12:00:00")) {
            const date = new Date(time);
            days[date.toLocaleDateString()] = entry;
          }
        });

        forecastDiv.innerHTML = '<h3>5-Day Forecast</h3><div class="forecast">' +
          Object.values(days).slice(0, 5).map(entry => {
            const date = new Date(entry.dt_txt);
            return `
              <div class="day">
                <div>${date.toLocaleDateString(undefined, { weekday: 'short' })}</div>
                <img src="https://openweathermap.org/img/wn/${entry.weather[0].icon}.png" />
                <div>${Math.round(entry.main.temp)}°C</div>
              </div>
            `;
          }).join('') + '</div>';

      } catch (err) {
        weatherDiv.innerHTML = `<p>Error: ${err.message}</p>`;
        forecastDiv.innerHTML = "";
      }
    }
  </script>
</body>
</html>
